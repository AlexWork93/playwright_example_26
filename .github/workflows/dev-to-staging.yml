# ─────────────────────────────────────────────────────────────────────────────
# Manual QA gate: run the full suite against staging before promoting.
#
# This workflow is triggered MANUALLY by a QA engineer or team lead after
# a dev → staging deployment has been completed. It does NOT auto-merge —
# a human reviews the results and decides whether to proceed.
#
# Flow:
#   1. Fetch the current dev branch HEAD SHA from playwright_app_mocking
#   2. Post 'pending' commit status on that SHA
#   3. Run full test suite against staging
#   4. Post 'success' or 'failure' — unblocking or keeping the merge blocked
#
# Trigger: Actions tab → "Dev → Staging QA gate" → Run workflow
# ─────────────────────────────────────────────────────────────────────────────

name: Dev → Staging — manual QA gate

run-name: "playwright_app_mocking staging — manual QA gate (by @${{ github.actor }})"

on:
  workflow_dispatch:

env:
  BASE_URL: ${{ vars.STAGING_BASE_URL || 'https://automationexercise.com' }}
  API_URL:  ${{ vars.STAGING_API_URL  || 'https://automationexercise.com' }}
  APP_REPO: AlexWork93/playwright_app_mocking

jobs:

  # ── Pre-flight: stamp commit as pending ─────────────────────────────────────
  pre-notify:
    name: Set status → pending
    runs-on: ubuntu-latest

    outputs:
      dev_sha: ${{ steps.get-sha.outputs.sha }}

    steps:
      - name: Fetch dev HEAD SHA and post pending
        id: get-sha
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PLAYWRIGHT_SUITE_PAT }}
          script: |
            const [owner, repo] = process.env.APP_REPO.split('/')

            const { data: branch } = await github.rest.repos.getBranch({ owner, repo, branch: 'dev' })
            const sha = branch.commit.sha
            core.setOutput('sha', sha)

            await github.rest.repos.createCommitStatus({
              owner, repo, sha,
              state:       'pending',
              context:     'playwright / staging-gate',
              description: 'Staging QA gate running…',
            })
            console.log(`Posted 'pending' on ${owner}/${repo}@${sha.slice(0,7)}`)

  # ── Stage 1: API ────────────────────────────────────────────────────────────
  api:
    name: API Tests — staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: pre-notify

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npx playwright install --with-deps chromium

      - name: Check target API is reachable
        id: connectivity
        run: |
          STATUS=$(curl -s -o /tmp/api_response.json -w "%{http_code}" \
            -H "Accept: application/json" \
            https://automationexercise.com/api/productsList)
          echo "http_status=$STATUS" >> $GITHUB_OUTPUT

          RESPONSE_CODE=$(node -e "
            try {
              const d = require('fs').readFileSync('/tmp/api_response.json','utf8');
              const j = JSON.parse(d);
              console.log(j.responseCode ?? 'missing');
            } catch(e) { console.log('not-json'); }
          ")
          echo "response_code=$RESPONSE_CODE" >> $GITHUB_OUTPUT

          echo "HTTP status: $STATUS"
          echo "API responseCode field: $RESPONSE_CODE"

          if [ "$RESPONSE_CODE" != "200" ]; then
            echo "::warning::automationexercise.com API returned '$RESPONSE_CODE' instead of 200."
            echo "::warning::This is a known Cloudflare issue with cloud runner IPs."
            echo "site_blocked=true" >> $GITHUB_OUTPUT
          else
            echo "site_blocked=false" >> $GITHUB_OUTPUT
          fi

      - name: Run API tests
        if: steps.connectivity.outputs.site_blocked == 'false'
        run: npm run test:api

      - name: Connectivity notice
        if: always()
        run: |
          if [ "${{ steps.connectivity.outputs.site_blocked }}" = "true" ]; then
            echo "::warning::API tests skipped — target site is unreachable from this runner."
          else
            echo "::notice::✓ Connectivity check passed — all API scenarios executed against staging."
          fi

      - name: Upload API report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-api-staging-manual
          path: playwright-report/
          retention-days: 30

  # ── Stage 2: E2E (parallel matrix) ─────────────────────────────────────────
  e2e:
    name: E2E — staging — ${{ matrix.browser }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: api

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install browser — ${{ matrix.browser }}
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run E2E tests — ${{ matrix.browser }}
        run: npx playwright test --project=${{ matrix.browser }}

      - name: Upload E2E report — ${{ matrix.browser }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-e2e-staging-manual-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30

  # ── Post-flight: stamp final result ─────────────────────────────────────────
  post-notify:
    name: Post final status
    runs-on: ubuntu-latest
    needs: [pre-notify, api, e2e]
    if: always()

    steps:
      - name: Post success or failure to app repo
        uses: actions/github-script@v7
        env:
          DEV_SHA:    ${{ needs.pre-notify.outputs.dev_sha }}
          API_RESULT: ${{ needs.api.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
          RUN_ID:     ${{ github.run_id }}
        with:
          github-token: ${{ secrets.PLAYWRIGHT_SUITE_PAT }}
          script: |
            const [owner, repo] = process.env.APP_REPO.split('/')
            const passed = process.env.API_RESULT === 'success' && process.env.E2E_RESULT === 'success'

            const state       = passed ? 'success' : 'failure'
            const description = passed ? '✓ All staging tests passed — safe to merge'
                                       : '✗ Staging tests failed — do not merge'

            await github.rest.repos.createCommitStatus({
              owner, repo,
              sha:        process.env.DEV_SHA,
              state,
              context:    'playwright / staging-gate',
              description,
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.RUN_ID}`,
            })
            console.log(`Posted '${state}' → ${description}`)
