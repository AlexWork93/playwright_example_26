# ─────────────────────────────────────────────────────────────────────────────
# Triggered by: a push to AlexWork93/playwright_app_mocking
#
# After tests finish this workflow posts a commit status back to the
# originating repo so GitHub branch protection can block/allow the merge.
# ─────────────────────────────────────────────────────────────────────────────

name: API Smoke — on app commit

run-name: >-
  ${{ github.event_name == 'repository_dispatch'
    && format('{0} {1} → {2}', github.event.client_payload.repo_name, github.event.client_payload.ref_name, github.event.client_payload.base_ref)
    || 'playwright_example_26 — manual trigger' }}

on:
  repository_dispatch:
    types: [app-updated]
  workflow_dispatch:

jobs:
  api-smoke:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npx playwright install --with-deps chromium

      # ── Connectivity check ──────────────────────────────────────────────────
      # automationexercise.com sits behind Cloudflare which rate-limits or blocks
      # cloud provider IPs. We verify the API returns real JSON before running
      # tests — if it returns an HTML challenge page the tests would fail with
      # misleading "responseCode: undefined" errors.
      #
      # On a real project this step would be removed because you'd test against
      # your own staging environment (set via API_URL secret), not a third-party
      # site that can block GitHub Actions runners.
      - name: Check target API is reachable
        id: connectivity
        run: |
          STATUS=$(curl -s -o /tmp/api_response.json -w "%{http_code}" \
            -H "Accept: application/json" \
            https://automationexercise.com/api/productsList)
          echo "http_status=$STATUS" >> $GITHUB_OUTPUT

          # Check the response is actually JSON with responseCode (not a Cloudflare HTML page)
          RESPONSE_CODE=$(node -e "
            try {
              const d = require('fs').readFileSync('/tmp/api_response.json','utf8');
              const j = JSON.parse(d);
              console.log(j.responseCode ?? 'missing');
            } catch(e) { console.log('not-json'); }
          ")
          echo "response_code=$RESPONSE_CODE" >> $GITHUB_OUTPUT

          echo "HTTP status: $STATUS"
          echo "API responseCode field: $RESPONSE_CODE"

          if [ "$RESPONSE_CODE" != "200" ]; then
            echo "::warning::automationexercise.com API returned '$RESPONSE_CODE' instead of 200."
            echo "::warning::This is a known Cloudflare issue with cloud runner IPs."
            echo "::warning::Skipping API tests — not a code defect."
            echo "site_blocked=true" >> $GITHUB_OUTPUT
          else
            echo "site_blocked=false" >> $GITHUB_OUTPUT
          fi

      - name: Run API tests
        id: api-tests
        if: steps.connectivity.outputs.site_blocked == 'false'
        run: npm run test:api

      # If Cloudflare blocked us, mark the step as skipped rather than failed
      # so the commit status reflects "infrastructure unavailable", not "tests broken"
      - name: Skip notice (site blocked by Cloudflare)
        if: steps.connectivity.outputs.site_blocked == 'true'
        run: |
          echo "::notice::API tests skipped — automationexercise.com is unreachable from this runner."
          echo "::notice::In production, point API_URL at your own staging environment."

      - name: Connectivity notice (tests ran normally)
        if: steps.connectivity.outputs.site_blocked == 'false'
        run: |
          echo "::notice::✓ Connectivity check passed — target site returned a valid JSON response."
          echo "::notice::Tests were not skipped due to a Cloudflare block; all scenarios executed against the live API."

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

      # ── Report result back to the triggering repo ───────────────────────────
      - name: Post commit status to app repo
        if: always() && github.event_name == 'repository_dispatch'
        uses: actions/github-script@v7
        env:
          TARGET_REPO:    ${{ github.event.client_payload.repo }}
          TARGET_SHA:     ${{ github.event.client_payload.sha }}
          TEST_OUTCOME:   ${{ steps.api-tests.outcome }}
          SITE_BLOCKED:   ${{ steps.connectivity.outputs.site_blocked }}
          RUN_ID:         ${{ github.run_id }}
        with:
          github-token: ${{ secrets.PLAYWRIGHT_SUITE_PAT }}
          script: |
            const blocked     = process.env.SITE_BLOCKED === 'true'
            const testOutcome = process.env.TEST_OUTCOME  // 'success' | 'failure' | 'skipped' | ''
            const [owner, repo] = process.env.TARGET_REPO.split('/')

            // If site was blocked, report success with a note rather than failure —
            // a Cloudflare block is not a code defect in the app being tested.
            const state       = blocked ? 'success'
                              : testOutcome === 'success' ? 'success' : 'failure'
            const description = blocked              ? '⚠ Skipped — target site unreachable from runner'
                              : state === 'success' ? '✓ All API tests passed'
                              : '✗ API tests failed'

            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha:         process.env.TARGET_SHA,
              state,
              context:     'playwright / api-smoke',
              description,
              target_url:  `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.RUN_ID}`,
            })

            console.log(`Posted '${state}' to ${process.env.TARGET_REPO}@${process.env.TARGET_SHA.slice(0,7)} — ${description}`)
