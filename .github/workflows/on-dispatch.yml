# ─────────────────────────────────────────────────────────────────────────────
# Triggered by: a push to AlexWork93/playwright_app_mocking
#
# After tests finish this workflow posts a commit status back to the
# originating repo so GitHub branch protection can block/allow the merge.
# ─────────────────────────────────────────────────────────────────────────────

name: API Smoke — on app commit

on:
  repository_dispatch:
    types: [app-updated]
  workflow_dispatch:

jobs:
  api-smoke:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npx playwright install --with-deps chromium

      # Give the test step an id so we can read its outcome afterwards
      - name: Run API tests
        id: api-tests
        run: npm run test:api

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

      # ── Report result back to the triggering repo ───────────────────────────
      # This step runs even when tests fail (if: always()) so the commit status
      # is never left stuck on "pending" regardless of outcome.
      #
      # PLAYWRIGHT_SUITE_PAT must be added as a secret in THIS repo too —
      # it needs write access to playwright_app_mocking to post the status.
      - name: Post commit status to app repo
        if: always() && github.event_name == 'repository_dispatch'
        uses: actions/github-script@v7
        env:
          TARGET_REPO:  ${{ github.event.client_payload.repo }}
          TARGET_SHA:   ${{ github.event.client_payload.sha }}
          TEST_OUTCOME: ${{ steps.api-tests.outcome }}
          RUN_ID:       ${{ github.run_id }}
        with:
          github-token: ${{ secrets.PLAYWRIGHT_SUITE_PAT }}
          script: |
            const [owner, repo] = process.env.TARGET_REPO.split('/')
            const passed        = process.env.TEST_OUTCOME === 'success'

            await github.rest.repos.createCommitStatus({
              owner,
              repo,
              sha:         process.env.TARGET_SHA,
              state:       passed ? 'success' : 'failure',
              context:     'playwright / api-smoke',
              description: passed ? '✓ All API tests passed' : '✗ API tests failed',
              target_url:  `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.RUN_ID}`,
            })

            console.log(`Posted ${passed ? 'success' : 'failure'} to ${process.env.TARGET_REPO}@${process.env.TARGET_SHA.slice(0,7)}`)
