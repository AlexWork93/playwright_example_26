# ─────────────────────────────────────────────────────────────────────────────
# Triggered by: playwright_app_mocking after unit tests pass on the app side.
#
# Pyramid:
#   L1 Unit       → placeholder (unit tests already ran in app repo before dispatch)
#   L2 Integration → API + DB in parallel (needs L1)
#   L3 Smoke      → placeholder for a dedicated smoke suite (needs L2)
#
# After all layers finish, posts a commit status back to the app repo so
# branch protection can block/allow the merge button.
# ─────────────────────────────────────────────────────────────────────────────

name: PR check — on app commit

run-name: >-
  ${{ github.event_name == 'repository_dispatch'
    && format('{0} {1} → {2}', github.event.client_payload.repo_name, github.event.client_payload.ref_name, github.event.client_payload.base_ref)
    || 'playwright_example_26 — manual trigger' }}

on:
  repository_dispatch:
    types: [app-updated]
  workflow_dispatch:

env:
  APP_REPO: AlexWork93/playwright_app_mocking

jobs:

  # ── L1: Unit ─────────────────────────────────────────────────────────────────
  # Unit tests already ran in the app repo before the dispatch was sent.
  # This stage is a placeholder — add playwright-side unit concerns here if needed.
  unit:
    name: "L1 — Unit (placeholder)"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Unit tests acknowledged
        run: |
          echo "::notice::Unit tests ran in playwright_app_mocking before this dispatch was sent."
          echo "::notice::Add any playwright-repo unit concerns here when needed."

  # ── L2: Integration — API ────────────────────────────────────────────────────
  integration-api:
    name: "L2 — Integration / API"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: unit

    outputs:
      site_blocked: ${{ steps.connectivity.outputs.site_blocked }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium

      # automationexercise.com sits behind Cloudflare which rate-limits or blocks
      # cloud provider IPs. We verify the API returns real JSON before running
      # tests — if it returns an HTML challenge page the tests would fail with
      # misleading "responseCode: undefined" errors.
      #
      # On a real project this step is removed because you test against your own
      # staging environment (API_URL secret), not a third-party site.
      - name: Check target API is reachable
        id: connectivity
        run: |
          STATUS=$(curl -s -o /tmp/api_response.json -w "%{http_code}" \
            -H "Accept: application/json" \
            https://automationexercise.com/api/productsList)
          echo "http_status=$STATUS" >> $GITHUB_OUTPUT
          RESPONSE_CODE=$(node -e "
            try {
              const d = require('fs').readFileSync('/tmp/api_response.json','utf8');
              const j = JSON.parse(d);
              console.log(j.responseCode ?? 'missing');
            } catch(e) { console.log('not-json'); }
          ")
          echo "response_code=$RESPONSE_CODE" >> $GITHUB_OUTPUT
          echo "HTTP status: $STATUS"
          echo "API responseCode field: $RESPONSE_CODE"
          if [ "$RESPONSE_CODE" != "200" ]; then
            echo "::warning::automationexercise.com API returned '$RESPONSE_CODE' — Cloudflare issue."
            echo "::warning::Skipping API tests — not a code defect."
            echo "site_blocked=true" >> $GITHUB_OUTPUT
          else
            echo "site_blocked=false" >> $GITHUB_OUTPUT
          fi

      - name: Run API tests
        id: api-tests
        if: steps.connectivity.outputs.site_blocked == 'false'
        run: npm run test:api

      - name: Connectivity notice
        if: always()
        run: |
          if [ "${{ steps.connectivity.outputs.site_blocked }}" = "true" ]; then
            echo "::warning::API tests skipped — automationexercise.com is unreachable from this runner."
          else
            echo "::notice::✓ Connectivity check passed — all API scenarios executed."
          fi

      - name: Upload API report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-integration-api-pr-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

  # ── L2: Integration — DB ─────────────────────────────────────────────────────
  integration-db:
    name: "L2 — Integration / DB"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: unit

    env:
      SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run DB tests
        run: npm run test:db
      - name: Upload DB report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-integration-db-pr-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

  # ── L3: Smoke ────────────────────────────────────────────────────────────────
  # Placeholder for a dedicated smoke suite (critical path E2E, fast subset).
  # Replace the echo with: npx playwright test --project=smoke
  smoke:
    name: "L3 — Smoke (placeholder)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [integration-api, integration-db]

    steps:
      - name: Smoke suite placeholder
        run: |
          echo "::notice::Smoke suite placeholder — add a fast critical-path E2E suite here."
          echo "::notice::Replace this step with: npx playwright test --project=smoke"

  # ── Post-notify: report result back to app repo ───────────────────────────────
  post-notify:
    name: Post commit status
    runs-on: ubuntu-latest
    needs: [unit, integration-api, integration-db, smoke]
    if: always() && github.event_name == 'repository_dispatch'

    steps:
      - name: Post commit status to app repo
        uses: actions/github-script@v7
        env:
          TARGET_REPO:   ${{ github.event.client_payload.repo }}
          TARGET_SHA:    ${{ github.event.client_payload.sha }}
          RUN_ID:        ${{ github.run_id }}
          UNIT_RES:      ${{ needs.unit.result }}
          API_RES:       ${{ needs.integration-api.result }}
          DB_RES:        ${{ needs.integration-db.result }}
          SMOKE_RES:     ${{ needs.smoke.result }}
          SITE_BLOCKED:  ${{ needs.integration-api.outputs.site_blocked }}
        with:
          github-token: ${{ secrets.PLAYWRIGHT_SUITE_PAT }}
          script: |
            const [owner, repo] = process.env.TARGET_REPO.split('/')
            const blocked = process.env.SITE_BLOCKED === 'true'

            const allPassed = ['UNIT_RES', 'API_RES', 'DB_RES', 'SMOKE_RES']
              .every(k => process.env[k] === 'success')

            const state = allPassed ? 'success' : 'failure'
            const description = blocked
              ? '⚠ API skipped (Cloudflare) — DB + smoke passed'
              : allPassed
                ? '✓ All checks passed'
                : '✗ Pipeline failed — do not merge'

            await github.rest.repos.createCommitStatus({
              owner, repo,
              sha:         process.env.TARGET_SHA,
              state,
              context:     'playwright / api-smoke',
              description,
              target_url:  `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.RUN_ID}`,
            })

            console.log(`Posted '${state}' to ${process.env.TARGET_REPO}@${process.env.TARGET_SHA.slice(0,7)} — ${description}`)
