# ─────────────────────────────────────────────────────────────────────────────
# Scheduled full-suite regression — runs every day at 08:00 UTC.
#
# Job order:
#   api → e2e (matrix: chromium + firefox in parallel)
#
# Why api runs first?
#   If the backend is completely broken the E2E tests will fail for the wrong
#   reason. Running API tests first gives a fast, clear signal:
#   "fix the API before looking at browser failures."
#
# Why matrix for E2E?
#   Instead of one job that runs chromium then firefox sequentially, GitHub
#   spins up two runners in parallel — cutting wall-clock time roughly in half.
#   Each browser gets its own artifact so reports don't overwrite each other.
# ─────────────────────────────────────────────────────────────────────────────

name: Daily Full Suite

run-name: "playwright_example_26 ${{ github.ref_name }} — daily"

on:
  schedule:
    - cron: '0 8 * * *'           # 08:00 UTC every day

  # Manual trigger — great for demos: go to Actions tab → Daily Full Suite → Run workflow
  workflow_dispatch:

jobs:

  # ── Stage 1: API ─────────────────────────────────────────────────────────────
  api:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npx playwright install --with-deps chromium

      # ── Connectivity check ──────────────────────────────────────────────────
      # automationexercise.com sits behind Cloudflare which rate-limits or blocks
      # cloud provider IPs. We verify the API returns real JSON before running
      # tests — if it returns an HTML challenge page the tests would fail with
      # misleading "responseCode: undefined" errors.
      #
      # On a real project this step would be removed because you'd test against
      # your own staging environment (set via API_URL secret), not a third-party
      # site that can block GitHub Actions runners.
      - name: Check target API is reachable
        id: connectivity
        run: |
          STATUS=$(curl -s -o /tmp/api_response.json -w "%{http_code}" \
            -H "Accept: application/json" \
            https://automationexercise.com/api/productsList)
          echo "http_status=$STATUS" >> $GITHUB_OUTPUT

          # Check the response is actually JSON with responseCode (not a Cloudflare HTML page)
          RESPONSE_CODE=$(node -e "
            try {
              const d = require('fs').readFileSync('/tmp/api_response.json','utf8');
              const j = JSON.parse(d);
              console.log(j.responseCode ?? 'missing');
            } catch(e) { console.log('not-json'); }
          ")
          echo "response_code=$RESPONSE_CODE" >> $GITHUB_OUTPUT

          echo "HTTP status: $STATUS"
          echo "API responseCode field: $RESPONSE_CODE"

          if [ "$RESPONSE_CODE" != "200" ]; then
            echo "::warning::automationexercise.com API returned '$RESPONSE_CODE' instead of 200."
            echo "::warning::This is a known Cloudflare issue with cloud runner IPs."
            echo "::warning::Skipping API tests — not a code defect."
            echo "site_blocked=true" >> $GITHUB_OUTPUT
          else
            echo "site_blocked=false" >> $GITHUB_OUTPUT
          fi

      - name: Run API tests
        if: steps.connectivity.outputs.site_blocked == 'false'
        run: npm run test:api

      - name: Connectivity notice
        if: always()
        run: |
          if [ "${{ steps.connectivity.outputs.site_blocked }}" = "true" ]; then
            echo "::warning::API tests skipped — automationexercise.com is unreachable from this runner."
            echo "::warning::In production, point API_URL at your own staging environment."
          else
            echo "::notice::✓ Connectivity check passed — target site returned a valid JSON response."
            echo "::notice::Tests were not skipped due to a Cloudflare block; all scenarios executed against the live API."
          fi

      - name: Upload API report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-api
          path: playwright-report/
          retention-days: 30

  # ── Stage 2: E2E (parallel matrix) ───────────────────────────────────────────
  e2e:
    name: E2E — ${{ matrix.browser }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: api                     # only start once API stage passes

    strategy:
      fail-fast: false             # if chromium fails, keep running firefox
      matrix:
        browser: [chromium, firefox]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install browser — ${{ matrix.browser }}
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run E2E tests — ${{ matrix.browser }}
        run: npx playwright test --project=${{ matrix.browser }}

      - name: Upload E2E report — ${{ matrix.browser }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-e2e-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30
