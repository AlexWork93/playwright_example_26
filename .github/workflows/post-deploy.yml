# ─────────────────────────────────────────────────────────────────────────────
# Post-deployment verification — runs against main (production) after
# the staging → main merge completes.
#
# Triggered automatically by staging-to-main.yml immediately after merge.
# Can also be triggered manually if you need to re-verify production.
#
# A failure here means something broke during the deployment itself —
# the code was green on staging but production is not behaving correctly.
# ─────────────────────────────────────────────────────────────────────────────

name: Post-deploy — production verification

run-name: "playwright_app_mocking main — post-deploy verification #${{ github.run_number }}"

on:
  workflow_dispatch:

env:
  BASE_URL: ${{ vars.PROD_BASE_URL || 'https://automationexercise.com' }}
  API_URL:  ${{ vars.PROD_API_URL  || 'https://automationexercise.com' }}

jobs:

  # ── Stage 1: API ────────────────────────────────────────────────────────────
  api:
    name: API Tests — production
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - run: npx playwright install --with-deps chromium

      - name: Check target API is reachable
        id: connectivity
        run: |
          STATUS=$(curl -s -o /tmp/api_response.json -w "%{http_code}" \
            -H "Accept: application/json" \
            https://automationexercise.com/api/productsList)
          echo "http_status=$STATUS" >> $GITHUB_OUTPUT

          RESPONSE_CODE=$(node -e "
            try {
              const d = require('fs').readFileSync('/tmp/api_response.json','utf8');
              const j = JSON.parse(d);
              console.log(j.responseCode ?? 'missing');
            } catch(e) { console.log('not-json'); }
          ")
          echo "response_code=$RESPONSE_CODE" >> $GITHUB_OUTPUT

          echo "HTTP status: $STATUS"
          echo "API responseCode field: $RESPONSE_CODE"

          if [ "$RESPONSE_CODE" != "200" ]; then
            echo "::warning::automationexercise.com API returned '$RESPONSE_CODE' instead of 200."
            echo "site_blocked=true" >> $GITHUB_OUTPUT
          else
            echo "site_blocked=false" >> $GITHUB_OUTPUT
          fi

      - name: Run API tests
        if: steps.connectivity.outputs.site_blocked == 'false'
        run: npm run test:api

      - name: Connectivity notice
        if: always()
        run: |
          if [ "${{ steps.connectivity.outputs.site_blocked }}" = "true" ]; then
            echo "::warning::API tests skipped — production site is unreachable from this runner."
          else
            echo "::notice::✓ Connectivity check passed — all API scenarios executed against production."
          fi

      - name: Upload API report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-api-prod-postdeploy
          path: playwright-report/
          retention-days: 60    # keep production reports longer

  # ── Stage 2: E2E (parallel matrix) ─────────────────────────────────────────
  e2e:
    name: E2E — production — ${{ matrix.browser }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: api

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install browser — ${{ matrix.browser }}
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run E2E tests — ${{ matrix.browser }}
        run: npx playwright test --project=${{ matrix.browser }}

      - name: Upload E2E report — ${{ matrix.browser }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-e2e-prod-postdeploy-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 60
