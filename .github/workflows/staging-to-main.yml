# ─────────────────────────────────────────────────────────────────────────────
# Friday deployment pipeline — staging → main — full testing pyramid.
#
# Runs every Friday at 09:00 Kyiv time (06:00 UTC / EEST, UTC+3).
#
# Pyramid:
#   L1 Unit         → triggers unit-tests.yml in app repo (staging branch), waits
#   L2 Integration  → API + DB in parallel (needs L1 green)
#   L3 E2E          → chromium + firefox in parallel (needs L2 green)
#   Promote         → creates PR staging→main, merges it, fires post-deploy
# ─────────────────────────────────────────────────────────────────────────────

name: Staging → Main — Friday deploy

run-name: "playwright_app_mocking staging → main — Friday deploy ${{ github.run_number }}"

on:
  schedule:
    - cron: '0 6 * * 5'    # Friday 09:00 Kyiv (EEST = UTC+3)
  workflow_dispatch:

env:
  BASE_URL: ${{ vars.STAGING_BASE_URL || 'https://automationexercise.com' }}
  API_URL:  ${{ vars.STAGING_API_URL  || 'https://automationexercise.com' }}
  APP_REPO: AlexWork93/playwright_app_mocking

jobs:

  # ── L1: Unit (app repo) ─────────────────────────────────────────────────────
  unit:
    name: "L1 — Unit (app repo / staging)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Trigger unit-tests.yml in app repo and wait
        uses: actions/github-script@v7
        env:
          UNIT_TEST_REF: staging
        with:
          github-token: ${{ secrets.PLAYWRIGHT_SUITE_PAT }}
          script: |
            const [owner, repo] = process.env.APP_REPO.split('/')
            const ref           = process.env.UNIT_TEST_REF
            const workflowId    = 'unit-tests.yml'
            const createdAfter  = new Date().toISOString()

            await github.rest.actions.createWorkflowDispatch({ owner, repo, workflow_id: workflowId, ref })
            console.log(`Dispatched ${workflowId} on ${repo}@${ref}`)

            await new Promise(r => setTimeout(r, 8000))

            let run
            for (let i = 0; i < 15; i++) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner, repo, workflow_id: workflowId, created: `>=${createdAfter}`, per_page: 1
              })
              if (data.workflow_runs.length > 0) { run = data.workflow_runs[0]; break }
              console.log(`Waiting for run to appear... (${i + 1}/15)`)
              await new Promise(r => setTimeout(r, 4000))
            }
            if (!run) return core.setFailed('Could not find the triggered unit test run')
            console.log(`Found run #${run.id}`)

            let polls = 0
            while (run.status !== 'completed') {
              if (polls++ > 20) return core.setFailed('Unit tests timed out')
              await new Promise(r => setTimeout(r, 15000))
              const { data } = await github.rest.actions.getWorkflowRun({ owner, repo, run_id: run.id })
              run = data
              console.log(`Status: ${run.status} (poll ${polls})`)
            }

            console.log(`Conclusion: ${run.conclusion} — ${run.html_url}`)
            if (run.conclusion !== 'success')
              core.setFailed(`Unit tests ${run.conclusion} — ${run.html_url}`)

  # ── L2: Integration — API ────────────────────────────────────────────────────
  integration-api:
    name: "L2 — Integration / API"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: unit

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - name: Check target API is reachable
        id: connectivity
        run: |
          STATUS=$(curl -s -o /tmp/api_response.json -w "%{http_code}" \
            -H "Accept: application/json" \
            https://automationexercise.com/api/productsList)
          echo "http_status=$STATUS" >> $GITHUB_OUTPUT
          RESPONSE_CODE=$(node -e "
            try {
              const d = require('fs').readFileSync('/tmp/api_response.json','utf8');
              const j = JSON.parse(d);
              console.log(j.responseCode ?? 'missing');
            } catch(e) { console.log('not-json'); }
          ")
          echo "response_code=$RESPONSE_CODE" >> $GITHUB_OUTPUT
          if [ "$RESPONSE_CODE" != "200" ]; then
            echo "::warning::automationexercise.com returned '$RESPONSE_CODE' — Cloudflare issue."
            echo "site_blocked=true" >> $GITHUB_OUTPUT
          else
            echo "site_blocked=false" >> $GITHUB_OUTPUT
          fi
      - name: Run API tests
        if: steps.connectivity.outputs.site_blocked == 'false'
        run: npm run test:api
      - name: Connectivity notice
        if: always()
        run: |
          if [ "${{ steps.connectivity.outputs.site_blocked }}" = "true" ]; then
            echo "::warning::API tests skipped — target site is unreachable from this runner."
          else
            echo "::notice::✓ Connectivity check passed — all API scenarios executed against staging."
          fi
      - name: Upload API report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-integration-api-staging-deploy
          path: playwright-report/
          retention-days: 30

  # ── L2: Integration — DB ─────────────────────────────────────────────────────
  integration-db:
    name: "L2 — Integration / DB"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: unit

    env:
      SUPABASE_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run DB tests
        run: npm run test:db
      - name: Upload DB report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-integration-db-staging-deploy
          path: playwright-report/
          retention-days: 30

  # ── L3: E2E ──────────────────────────────────────────────────────────────────
  e2e:
    name: "L3 — E2E / ${{ matrix.browser }}"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [integration-api, integration-db]

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install browser — ${{ matrix.browser }}
        run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: Run E2E tests — ${{ matrix.browser }}
        run: npx playwright test --project=${{ matrix.browser }}
      - name: Upload E2E report — ${{ matrix.browser }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-e2e-staging-deploy-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30

  # ── Promote: staging → main ───────────────────────────────────────────────────
  promote:
    name: Merge staging → main
    runs-on: ubuntu-latest
    needs: [unit, integration-api, integration-db, e2e]

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Create PR and merge staging → main
        uses: actions/github-script@v7
        env:
          RUN_ID: ${{ github.run_id }}
        with:
          github-token: ${{ secrets.PLAYWRIGHT_SUITE_PAT }}
          script: |
            const [owner, repo] = process.env.APP_REPO.split('/')
            const date = new Date().toISOString().slice(0, 10)
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.RUN_ID}`

            const compare = await github.rest.repos.compareCommits({
              owner, repo, base: 'main', head: 'staging',
            })
            if (compare.data.ahead_by === 0) {
              console.log('staging is already up to date with main — nothing to merge.')
              return
            }

            const pr = await github.rest.pulls.create({
              owner, repo,
              title: `chore: deploy staging → main (${date})`,
              head: 'staging', base: 'main',
              body: [
                '## Automated Friday deployment',
                '',
                `Full testing pyramid passed ✓ — [run #${process.env.RUN_ID}](${runUrl})`,
                '',
                '| Layer | Status |',
                '|---|---|',
                '| L1 Unit (app repo / staging) | ✓ |',
                '| L2 Integration — API | ✓ |',
                '| L2 Integration — DB  | ✓ |',
                '| L3 E2E — chromium    | ✓ |',
                '| L3 E2E — firefox     | ✓ |',
                '',
                '_Created and merged automatically by the Friday deploy pipeline._',
              ].join('\n'),
            })
            console.log(`Created PR #${pr.data.number}: ${pr.data.html_url}`)

            await github.rest.pulls.merge({
              owner, repo,
              pull_number: pr.data.number,
              merge_method: 'merge',
              commit_title: `chore: deploy staging → main (${date})`,
              commit_message: `Merged by Friday deploy pipeline — run #${process.env.RUN_ID}`,
            })
            console.log(`Merged PR #${pr.data.number}`)

      - name: Dispatch post-deploy verification
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: 'post-deploy.yml', ref: 'main',
            })
            console.log('Dispatched post-deploy.yml on main.')
